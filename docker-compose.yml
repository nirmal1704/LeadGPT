services:
  redis:
    image: redis:7-alpine
    networks:
      - leadgpt_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - leadgpt_network
    entrypoint: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - DEBUG=pw:api
    depends_on:
      - redis
      - backend
    networks:
      - leadgpt_network
    entrypoint: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    deploy:
      resources:
        limits:
          memory: 3g
    shm_size: '2gb'
    restart: unless-stopped


networks:
  leadgpt_network:
    driver: bridge
